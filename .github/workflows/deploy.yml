name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/ronitnath/ronitnath

jobs:
  build:
    runs-on: [self-hosted, delenda]
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - id: meta
        run: echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        env:
          CONTAINER_HOST: unix:///run/podman/podman.sock
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman --remote login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build image
        env:
          CONTAINER_HOST: unix:///run/podman/podman.sock
        run: |
          podman --remote build \
            -f docker/ronitnath.Dockerfile \
            -t "$IMAGE:${{ steps.meta.outputs.tag }}" \
            -t "$IMAGE:latest" \
            .

      - name: Push image
        env:
          CONTAINER_HOST: unix:///run/podman/podman.sock
        run: |
          podman --remote push "$IMAGE:${{ steps.meta.outputs.tag }}"
          podman --remote push "$IMAGE:latest"

  deploy:
    runs-on: [self-hosted, nexus-deploy]
    needs: build
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Drop legacy container if unmanaged
        run: |
          if docker inspect ronitnath >/dev/null 2>&1; then
            managed=$(docker inspect ronitnath --format '{{ index .Config.Labels "com.docker.compose.project" }}' || true)
            if [ -z "$managed" ]; then
              echo "Removing pre-compose container"
              docker rm -f ronitnath
            fi
          fi

      - name: Deploy
        working-directory: deploy
        run: |
          docker compose pull
          docker compose up -d --remove-orphans

      - name: Health check
        run: |
          for i in $(seq 1 30); do
            if curl -fsS -o /dev/null http://127.0.0.1:18080/; then
              echo "ok after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "health check failed"
          docker logs --tail 100 ronitnath || true
          exit 1
