[package]
name = "stage_1"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1"
askama = "0.16"
axum = "0.8"
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tower-http = { version = "0.6", features = ["fs", "trace"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
