schema = 1
app = "ronitnath"
user = "ronitnath-app"

[[binary]]
name = "site"
socket = "10.0.0.1:3130"
default_env = false
env = { DATABASE_URL = "sqlite:/data/apps/ronitnath/app.db", PHOTO_STORAGE_DIR = "/data/apps/ronitnath/photos", OIDC_PROVIDERS_PATH = "/data/apps/ronitnath/oidc_providers.json", PUBLIC_URL = "https://ronitnath.com", RUST_LOG = "info", TRUSTED_PROXY = "true" }

[[binary]]
name = "admin"
socket = "100.88.31.199:3131"
after = ["ronitnath-site.service"]
wants = ["ronitnath-site.service"]
bind_env = "ADMIN_BIND_ADDR"
default_env = false
env = { DATABASE_URL = "sqlite:/data/apps/ronitnath/app.db", PHOTO_STORAGE_DIR = "/data/apps/ronitnath/photos", OIDC_PROVIDERS_PATH = "/data/apps/ronitnath/oidc_providers.json", PUBLIC_URL = "https://ronitnath.com", RUST_LOG = "info", AUTH_SIGNUP = "closed" }

[build]
commands = ["cargo build --release --locked", "sh ts/build.sh"]
env = { SQLX_OFFLINE = "true" }

[state]
migrations = "migrations"
