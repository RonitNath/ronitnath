{% extends "_layout.html" %}

{% block title %}Sign in · stage_2{% endblock %}

{% block content %}
<section class="hero">
    <h1>Sign in</h1>
</section>
<section class="auth-form-card">
    <form method="post" action="/login">
        <input type="hidden" name="next" value="{{ next }}" />
        <label>
            Email
            <input type="email" name="email" required autocomplete="email" />
        </label>
        <label>
            Password
            <input type="password" name="password" required autocomplete="current-password" />
        </label>
        <button type="submit" class="auth-link auth-link-primary">Sign in</button>
    </form>
    {% if !oidc_providers.is_empty() %}
    <div class="oidc-login">
        <p class="muted">Or use SSO:</p>
        {% for provider in oidc_providers %}
        <a class="auth-link auth-link-primary oidc-button" href="/auth/oidc/{{ provider.key }}/start?next={{ next }}">
            Continue with {{ provider.display_name }}
        </a>
        {% endfor %}
    </div>
    {% endif %}
    <p class="muted">No account? <a href="/signup">Sign up</a>.</p>
</section>
{% endblock %}
