<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Ronit Nath{% endblock %}</title>
    {% if let Some(user) = current_user %}
    <meta name="csrf-token" content="{{ user.csrf_token }}" />
    {% endif %}
    {% include "_theme.html" %}
    <link rel="stylesheet" href="/static/css/base.css" />
    <link rel="stylesheet" href="/static/css/atmosphere.css" />
    <link rel="stylesheet" href="/static/css/layout.css" />
    <link rel="stylesheet" href="/static/css/components.css" />
</head>
<body>
    <div class="starfield" aria-hidden="true">
        <div class="stars-dim"></div>
        <div class="stars-med"></div>
        <div class="stars-bright"></div>
    </div>
    <div class="nebula" aria-hidden="true"></div>

    <header class="topbar">
        <button class="nav-toggle" type="button" aria-label="Open menu"
                aria-controls="menu" aria-expanded="false">
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
        </button>

        <a class="brand" href="/">Ronit Nath</a>

        <!-- Center nav + right-hand auth. On desktop `.menu` is `display:
             contents`, so `.nav` and `.auth` lay out directly in the topbar.
             On mobile it becomes the slide-in left drawer. -->
        <div class="menu" id="menu">
            <nav class="nav">
                <a href="/" class="{% if nav_active == "home" %}active{% endif %}">Home</a>
                <a href="/about" class="{% if nav_active == "about" %}active{% endif %}">About</a>
                <a href="/guestbook" class="{% if nav_active == "guestbook" %}active{% endif %}">Guestbook</a>
            </nav>
            <div class="auth">
                <button class="theme-toggle" id="theme-toggle" type="button"
                        aria-label="Toggle color theme">
                    <span class="theme-toggle-icon" aria-hidden="true"></span>
                </button>
                {% if let Some(user) = current_user %}
                <a class="auth-link" href="/settings">{{ user.display_name }}</a>
                <form method="post" action="/logout" class="auth-logout-form">
                    <input type="hidden" name="csrf_token" value="{{ user.csrf_token }}" />
                    <button class="auth-link" type="submit">Sign out</button>
                </form>
                {% else %}
                <a class="auth-link" href="/login">Sign in</a>
                <a class="auth-link auth-link-primary" href="/signup">Sign up</a>
                {% endif %}
            </div>
        </div>

        <div class="drawer-overlay" id="drawer-overlay" hidden></div>
    </header>
    <main class="content">
        {% block content %}{% endblock %}
    </main>
    <script type="module" src="/static/dist/site.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
