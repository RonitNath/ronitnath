name: build-and-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: [self-hosted, native]
    steps:
      - name: Check out the exact revision
        uses: https://code.forgejo.org/actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          persist-credentials: false
          clean: true
      - name: Build and test with persistent warm caches
        run: |
          repo_cache=/data/apps/forgejo-runner/cache/repos/${GITHUB_REPOSITORY:?}
          export CARGO_HOME="$repo_cache/cargo-home"
          export CARGO_TARGET_DIR="$repo_cache/cargo-target"
          export npm_config_cache="$repo_cache/npm-cache"
          export PNPM_STORE_DIR="$repo_cache/pnpm-store"
          mkdir -p "$CARGO_HOME" "$CARGO_TARGET_DIR" "$npm_config_cache" "$PNPM_STORE_DIR"
          nix develop --command bash -euo pipefail -c '
            cargo build --release --locked
            cargo test --locked
            pnpm install --frozen-lockfile --store-dir "$PNPM_STORE_DIR"
            pnpm check
            pnpm build
          '
      - name: Controlled red-build proof gate
        run: test ! -e .ci-red-proof
