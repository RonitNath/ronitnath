name: build-and-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: [self-hosted, native]
    steps:
      - name: Check out the exact revision
        uses: https://code.forgejo.org/actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          persist-credentials: false
          clean: true
      - name: Build and test with persistent warm caches
        run: |
          export PATH=/nix/var/nix/profiles/default/bin:$PATH
          repo_cache=/data/apps/forgejo-runner/cache/repos/${GITHUB_REPOSITORY:?}
          export CARGO_HOME="$repo_cache/cargo-home"
          export CARGO_TARGET_DIR="$repo_cache/cargo-target"
          export npm_config_cache="$repo_cache/npm-cache"
          mkdir -p "$CARGO_HOME" "$CARGO_TARGET_DIR" "$npm_config_cache"
          nix develop --command bash -euo pipefail -c '
            cargo build --release --locked
            cargo test --locked
            sh ts/build.sh
          '
      - name: Controlled red-build proof gate
        run: test ! -e .ci-red-proof

  load-sanity:
    if: forgejo.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        slot: [1, 2, 3, 4]
    runs-on: [self-hosted, native]
    steps:
      - name: Check out the exact revision
        uses: https://code.forgejo.org/actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          persist-credentials: false
          clean: true
      - name: Build and test representative warm-cache workload
        run: |
          export PATH=/nix/var/nix/profiles/default/bin:$PATH
          repo_cache=/data/apps/forgejo-runner/cache/repos/${GITHUB_REPOSITORY:?}
          export CARGO_HOME="$repo_cache/cargo-home"
          export CARGO_TARGET_DIR="$repo_cache/cargo-target"
          export npm_config_cache="$repo_cache/npm-cache"
          mkdir -p "$CARGO_HOME" "$CARGO_TARGET_DIR" "$npm_config_cache"
          nix develop --command bash -euo pipefail -c '
            cargo build --release --locked
            cargo test --locked
            sh ts/build.sh
          '
